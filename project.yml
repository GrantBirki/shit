name: Shit

options:
  bundleIdPrefix: com.grantbirki
  deploymentTarget:
    macOS: "26.0"

settings:
  base:
    SWIFT_VERSION: 6.0
    ENABLE_CODE_COVERAGE: NO
    CLANG_COVERAGE_MAPPING: NO

targets:
  Shit:
    type: application
    platform: macOS
    sources:
      - Sources
    resources:
      - Sources/Resources/Assets.xcassets
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: $(APP_DISPLAY_NAME)
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        GIT_SHA: $(GIT_SHA)
        LSUIElement: true
        NSCalendarsFullAccessUsageDescription: Shit reads your local calendars to alert you when meetings are starting.
        NSHighResolutionCapable: true
    settings:
      base:
        APP_DISPLAY_NAME: Shit
        PRODUCT_BUNDLE_IDENTIFIER: com.grantbirki.shit
        SWIFT_VERSION: 6.0
        ENABLE_CODE_COVERAGE: NO
        CLANG_COVERAGE_MAPPING: NO
        MARKETING_VERSION: 0.0.0
        CURRENT_PROJECT_VERSION: 0.0.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          APP_DISPLAY_NAME: Shit Dev
          PRODUCT_BUNDLE_IDENTIFIER: com.grantbirki.shit.dev
  ShitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    settings:
      base:
        SWIFT_VERSION: 6.0
        ENABLE_CODE_COVERAGE: NO
        CLANG_COVERAGE_MAPPING: NO
    dependencies:
      - target: Shit
