name: release

on:
  push:
    branches:
      - main
    paths:
      - "VERSION"

permissions: {}

jobs:
  build:
    if: github.repository == 'grantbirki/shit'
    permissions:
      contents: read
      id-token: write
      attestations: write
    runs-on: macos-26
    outputs:
      artifact-id: ${{ steps.upload-artifact.outputs.artifact-id }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: read version
        id: version
        run: |
          version=$(awk 'NF && $1 !~ /^#/ {print $1; exit}' VERSION)
          if [[ -z "$version" ]]; then
            echo "VERSION file is empty."
            exit 1
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must be in X.Y.Z format; got ${version}."
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: install xcodegen
        run: |
          export HOMEBREW_NO_AUTO_UPDATE=1
          export HOMEBREW_NO_INSTALL_CLEANUP=1
          brew install xcodegen

      - name: package
        run: script/package

      - name: scan artifact for tokens
        run: |
          artifact="dist/Shit.zip"
          if [[ ! -f "$artifact" ]]; then
            echo "Expected artifact not found at $artifact"
            exit 1
          fi

          scan_dir="$(mktemp -d)"
          trap 'rm -rf "$scan_dir"' EXIT
          ditto -x -k "$artifact" "$scan_dir"

          if grep -R -a -E -n 'gh[pousr]_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]{20,}' "$scan_dir" >/dev/null; then
            echo "Potential token found in release artifact (file paths only):"
            grep -R -a -E -l 'gh[pousr]_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]{20,}' "$scan_dir"
            exit 1
          fi

      - name: attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # pin@v4.1.0
        with:
          subject-path: "dist/Shit.zip"

      - name: upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # pin@v7.0.1
        id: upload-artifact
        with:
          name: dist
          path: dist/
          retention-days: 5
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # pin@8.0.1
        with:
          artifact-ids: ${{ needs.build.outputs.artifact-id }}
          path: "dist/"

      - name: ensure tag does not exist
        env:
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag already exists: ${TAG}"
            exit 1
          fi

      - name: create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # pin@v3.0.0
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: ${{ needs.build.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/Shit.zip
            dist/Shit.zip.sha256
          generate_release_notes: true

  verify:
    permissions: {}
    runs-on: ubuntu-latest
    needs: [build, release]
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # pin@8.0.1
        with:
          artifact-ids: ${{ needs.build.outputs.artifact-id }}
          path: "dist/"

      - name: verify
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          ARTIFACT_PATH: "dist/Shit.zip"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_REF: refs/heads/${{ github.ref_name }}
        run: |
          if [[ ! -f "$ARTIFACT_PATH" ]]; then
            echo "Expected artifact not found at $ARTIFACT_PATH"
            exit 1
          fi

          if [[ ! -f "${ARTIFACT_PATH}.sha256" ]]; then
            echo "Expected checksum not found at ${ARTIFACT_PATH}.sha256"
            exit 1
          fi

          expected_sha=$(cat "${ARTIFACT_PATH}.sha256")
          actual_sha=$(shasum -a 256 "$ARTIFACT_PATH" | awk '{print $1}')
          if [[ "$expected_sha" != "$actual_sha" ]]; then
            echo "Checksum mismatch: expected $expected_sha but got $actual_sha"
            exit 1
          fi

          gh attestation verify "$ARTIFACT_PATH" \
            --repo "${OWNER}/${REPO}" \
            --signer-workflow "${OWNER}/${REPO}/.github/workflows/release.yml" \
            --source-ref "$SOURCE_REF" \
            --deny-self-hosted-runners

  release_info:
    permissions: {}
    runs-on: ubuntu-latest
    needs: [build, release, verify]
    if: ${{ always() }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # pin@8.0.1
        with:
          artifact-ids: ${{ needs.build.outputs.artifact-id }}
          path: "dist/"

      - name: print tap update info
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          sha_file="dist/Shit.zip.sha256"
          if [[ ! -f "$sha_file" ]]; then
            echo "Release info unavailable: expected checksum not found at $sha_file"
            exit 0
          fi

          sha=$(cat "$sha_file")
          if [[ ! "$sha" =~ ^[0-9a-fA-F]{64}$ ]]; then
            echo "Release info unavailable: invalid SHA256 in $sha_file"
            exit 0
          fi

          green='\033[0;32m'
          blue='\033[0;34m'
          yellow='\033[0;33m'
          off='\033[0m'

          echo -e "${green}Homebrew tap update details:${off}"
          echo -e "  ${blue}version${off}: ${VERSION}"
          echo -e "  ${blue}sha256${off}: ${sha}"
          echo
          echo -e "${yellow}Cask snippet:${off}"
          cat <<RUBY
          cask "shit" do
            version "${VERSION}"
            sha256 "${sha}"

            url "https://github.com/grantbirki/shit/releases/download/v#{version}/Shit.zip"
            name "Shit"
            desc "Menu bar app that makes missed meetings harder"
            homepage "https://github.com/grantbirki/shit"

            livecheck do
              url :url
              strategy :github_latest
            end

            depends_on macos: ">= :tahoe"

            app "Shit.app"

            postflight do
              result = system_command(
                "/usr/bin/xattr",
                args:         ["-dr", "com.apple.quarantine", "#{appdir}/Shit.app"],
                print_stderr: true,
              )
              unless result.success?
                opoo "Failed to clear quarantine automatically. " \
                     "You can run: `xattr -dr com.apple.quarantine #{appdir}/Shit.app`"
              end
            end

            zap trash: [
              "~/Library/Preferences/com.grantbirki.shit.plist",
              "~/Library/Saved Application State/com.grantbirki.shit.savedState",
            ]
          end
          RUBY
